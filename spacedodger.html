<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Space Dodger</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#0f1724;
      --accent:#7ee7c7;
      --muted:#94a3b8;
      --danger:#ff6b6b;
      --glass: rgba(255,255,255,0.04);
    }
    html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, #051025 0%, #07162a 70%), radial-gradient(600px 300px at 10% 10%, rgba(126,231,199,0.03), transparent);
      color:#e6eef8;
      -webkit-font-smoothing:antialiased;
    }
    .game-wrap{
      width:100%;
      max-width:900px;
      margin:24px;
      display:grid;
      grid-template-columns: 1fr 300px;
      gap:18px;
      align-items:start;
    }
    .canvas-wrap{
      background:var(--panel);
      padding:12px;
      border-radius:12px;
      box-shadow: 0 6px 30px rgba(2,6,23,0.6);
    }
    canvas{
      display:block;
      width:100%;
      height:600px;
      border-radius:8px;
      background: linear-gradient(180deg, rgba(10,15,30,0.9), rgba(7,10,18,0.6));
    }
    .sidebar{
      background:var(--panel);
      padding:14px;
      border-radius:12px;
      min-height:200px;
    }
    h1{font-size:20px;margin:0 0 8px 0;color:var(--accent)}
    .stat{font-size:14px;color:var(--muted); margin-bottom:10px;}
    .big{font-weight:700;color:#fff;font-size:28px;letter-spacing:0.6px}
    .controls{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.05);
      color:var(--accent);
      padding:8px 12px;border-radius:8px;
      cursor:pointer;font-weight:600;
      transition:transform .12s ease, opacity .12s ease;
    }
    button:active{transform:translateY(1px) scale(.995)}
    .muted{color:var(--muted);font-size:13px}
    .footer{font-size:12px;color:var(--muted);margin-top:14px}
    .touch-controls{
      display:none;
      width:100%;
      gap:12px;
      margin-top:12px;
      justify-content:center;
    }
    .touch-controls .btn{
      width:84px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04);
      color:var(--accent);font-size:16px;
      user-select:none;
    }
    .hud {
      position: absolute;
      left: 12px;
      top: 12px;
      color:var(--muted);
      font-size:13px;
      display:flex;gap:12px;align-items:center;
      background: rgba(0,0,0,0.15); padding:6px 9px;border-radius:8px;
      backdrop-filter: blur(3px);
    }
    @media (max-width:900px){
      .game-wrap{grid-template-columns:1fr; padding:8px;}
      canvas{height:520px;}
      .sidebar{order:2}
      .touch-controls{display:flex}
    }
    /* simple focus styles for accessibility */
    button:focus{outline:2px solid rgba(126,231,199,0.28);outline-offset:2px}
  </style>
</head>
<body>
  <div class="game-wrap" role="application" aria-label="Space dodger game">
    <div class="canvas-wrap" style="position:relative;">
      <div class="hud" id="hud">Score: <span id="hudScore">0</span> &nbsp; Lives: <span id="hudLives">3</span></div>
      <canvas id="game"></canvas>
    </div>

    <aside class="sidebar" aria-labelledby="menuTitle">
      <h1 id="menuTitle">Space Dodger</h1>
      <div class="stat muted">Dodge asteroids, survive as long as you can. Controls: ← → or A/D. On mobile use the buttons below.</div>

      <div style="margin-top:8px">
        <div class="stat">Score</div>
        <div class="big" id="scoreDisplay">0</div>
      </div>

      <div style="margin-top:12px">
        <div class="stat">Best</div>
        <div class="big" id="bestDisplay">0</div>
      </div>

      <div class="controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="muteBtn">Mute</button>
        <button id="restartBtn">Restart</button>
      </div>

      <div class="touch-controls" id="touchControls" aria-hidden="true">
        <div class="btn" id="leftBtn">◀︎</div>
        <div class="btn" id="thrustBtn">BOOST</div>
        <div class="btn" id="rightBtn">▶︎</div>
      </div>

      <div class="footer">
        <div>Lives: <span id="livesText">3</span></div>
        <div style="margin-top:8px">Difficulty increases over time. Collect green gems for +10 points!</div>
      </div>
    </aside>
  </div>

  <script>
  // ---- Space Dodger: single-file JS game ----
  // Author: ChatGPT (example)
  // Save as index.html and open in a browser.

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: true });
  // pixel ratio for crisp rendering on high DPI displays
  function fitCanvas() {
    const rect = canvas.getBoundingClientRect();
    const DPR = window.devicePixelRatio || 1;
    canvas.width = Math.max(600, Math.floor(rect.width * DPR));
    canvas.height = Math.max(400, Math.floor(rect.height * DPR));
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);

  // UI elements
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const restartBtn = document.getElementById('restartBtn');
  const muteBtn = document.getElementById('muteBtn');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const bestDisplay = document.getElementById('bestDisplay');
  const hudScore = document.getElementById('hudScore');
  const hudLives = document.getElementById('hudLives');
  const leftBtn = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');
  const thrustBtn = document.getElementById('thrustBtn');
  const touchControls = document.getElementById('touchControls');

  // Game state
  let running = false;
  let paused = false;
  let muted = false;
  let lastTime = 0;
  let elapsed = 0;
  let spawnTimer = 0;
  let spawnInterval = 1000; // ms between asteroids (gets smaller)
  let difficultyTimer = 0;

  let score = 0;
  let best = Number(localStorage.getItem('spaceDodgerBest') || 0);
  bestDisplay.textContent = best;

  const state = {
    player: {
      x: 0, y: 0, w: 46, h: 30, speed: 420, dx: 0,
      cooldown:0
    },
    asteroids: [],
    gems: [],
    lives: 3
  };

  // input
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
  });
  window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });

  // touch buttons
  let leftHold=false, rightHold=false, boostHold=false;
  leftBtn.addEventListener('touchstart', e=>{ e.preventDefault(); leftHold=true; });
  leftBtn.addEventListener('touchend', e=>{ e.preventDefault(); leftHold=false; });
  rightBtn.addEventListener('touchstart', e=>{ e.preventDefault(); rightHold=true; });
  rightBtn.addEventListener('touchend', e=>{ e.preventDefault(); rightHold=false; });
  thrustBtn.addEventListener('touchstart', e=>{ e.preventDefault(); boostHold=true; });
  thrustBtn.addEventListener('touchend', e=>{ e.preventDefault(); boostHold=false; });

  // helpers
  function rand(min, max){ return Math.random() * (max-min) + min; }
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  // entity factories
  function spawnAsteroid() {
    const cw = canvas.clientWidth;
    const size = rand(18, 70);
    const x = rand(size, cw - size);
    const speed = rand(140, 320) + Math.min(200, elapsed / 2);
    const rot = rand(-1.8, 1.8);
    state.asteroids.push({ x, y: -size, size, speed, rot, angle: rand(0,Math.PI*2) });
  }
  function spawnGem() {
    const cw = canvas.clientWidth;
    const size = 18;
    const x = rand(size, cw - size);
    const speed = rand(90, 150);
    state.gems.push({ x, y: -size, size, speed });
  }

  // initialize or reset
  function reset() {
    state.player.x = canvas.clientWidth / 2;
    state.player.y = canvas.clientHeight - 80;
    state.player.dx = 0;
    state.asteroids = [];
    state.gems = [];
    state.lives = 3;
    score = 0;
    elapsed = 0;
    spawnInterval = 1000;
    spawnTimer = 0;
    difficultyTimer = 0;
    scoreDisplay.textContent = score;
    hudScore.textContent = score;
    hudLives.textContent = state.lives;
    document.getElementById('livesText').textContent = state.lives;
  }

  // collision helpers
  function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh){
    return !(ax+aw < bx || bx+bw < ax || ay+ah < by || by+bh < ay);
  }

  // draw helpers
  function drawShip(x,y,w,h, t){
    // ship body
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(t/200)*0.03);
    ctx.beginPath();
    ctx.moveTo(-w/2, h/2);
    ctx.lineTo(0, -h/1.5);
    ctx.lineTo(w/2, h/2);
    ctx.closePath();
    ctx.fillStyle = 'rgba(190,245,220,0.12)';
    ctx.fill();
    // cockpit
    ctx.beginPath();
    ctx.ellipse(0, -h/2.2, w/6, h/5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(126,231,199,0.9)';
    ctx.fill();
    // thruster flames when boosting (if boostHold)
    ctx.restore();
  }

  function drawAsteroid(a){
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.angle);
    ctx.beginPath();
    const spikes = Math.max(6, Math.floor(a.size/6));
    for(let i=0;i<spikes;i++){
      const ang = (i/spikes) * Math.PI*2;
      const r = a.size * (0.6 + Math.random()*0.6);
      const px = Math.cos(ang)*r;
      const py = Math.sin(ang)*r;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle = '#82786b';
    ctx.fill();
    ctx.restore();
  }

  function drawGem(g){
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate((g.y/30) % (Math.PI*2));
    ctx.beginPath();
    ctx.moveTo(0,-g.size);
    ctx.lineTo(g.size/2,0);
    ctx.lineTo(0,g.size);
    ctx.lineTo(-g.size/2,0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(126,231,199,0.95)';
    ctx.fill();
    ctx.restore();
  }

  // audio (very small, generated using oscillator — respects mute)
  function beep(freq, duration=0.08, type='sine', vol=0.05){
    if(muted) return;
    try{
      const ac = beep.ctx || (beep.ctx = new (window.AudioContext || window.webkitAudioContext)());
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(ac.destination);
      o.start();
      o.stop(ac.currentTime + duration);
      o.onended = ()=>{ o.disconnect(); g.disconnect(); };
    }catch(e){}
  }

  // game loop
  function update(dt){
    if(paused || !running) return;
    elapsed += dt;
    spawnTimer += dt;
    difficultyTimer += dt;

    // Increase difficulty every 8 seconds
    if(difficultyTimer > 8000){
      difficultyTimer = 0;
      spawnInterval = Math.max(350, spawnInterval * 0.92);
      // spawn a few asteroids immediately as difficulty spike
      spawnAsteroid();
      spawnAsteroid();
    }

    // spawn asteroids
    if(spawnTimer > spawnInterval){
      spawnTimer = 0;
      spawnAsteroid();
      // small chance to spawn a gem
      if(Math.random() < 0.18) spawnGem();
    }

    // player controls
    const p = state.player;
    let move = 0;
    if(keys['arrowleft'] || keys['a'] || leftHold) move -= 1;
    if(keys['arrowright'] || keys['d'] || rightHold) move += 1;

    // boost / thrust: faster lateral movement
    const boosting = keys[' '] || boostHold || keys['w'] || keys['arrowup'];
    const speed = p.speed * (boosting ? 1.9 : 1.0);
    p.dx = move * speed;
    p.x += p.dx * dt / 1000;
    // keep inside canvas
    p.x = clamp(p.x, p.w/2, canvas.clientWidth - p.w/2);

    // update asteroids
    for(let i=state.asteroids.length-1;i>=0;i--){
      const a = state.asteroids[i];
      a.y += a.speed * dt / 1000;
      a.angle += a.rot * dt / 1000;
      // collision with player (approx by rectangles)
      if(rectsOverlap(a.x - a.size, a.y - a.size, a.size*2, a.size*2,
                      p.x - p.w/2, p.y - p.h/2, p.w, p.h)){
        // hit
        state.asteroids.splice(i,1);
        state.lives--;
        hudLives.textContent = state.lives;
        document.getElementById('livesText').textContent = state.lives;
        beep(120, 0.12, 'sawtooth', 0.08);
        if(state.lives <= 0){
          // game over
          running = false;
          if(score > best){ best = score; localStorage.setItem('spaceDodgerBest', best); bestDisplay.textContent = best; }
          alert('Game over! Score: ' + score);
        }
      } else if(a.y - a.size > canvas.clientHeight + 40){
        // passed screen, remove
        state.asteroids.splice(i,1);
        score += Math.floor(a.size/10); // small reward for dodging big ones
        updateScore();
      }
    }

    // update gems
    for(let i=state.gems.length-1;i>=0;i--){
      const g = state.gems[i];
      g.y += g.speed * dt / 1000;
      if(rectsOverlap(g.x-g.size, g.y-g.size, g.size*2, g.size*2,
                      p.x - p.w/2, p.y - p.h/2, p.w, p.h)){
        // collect
        state.gems.splice(i,1);
        score += 10;
        updateScore();
        beep(800, 0.08, 'triangle', 0.06);
      } else if(g.y - g.size > canvas.clientHeight + 40){
        state.gems.splice(i,1);
      }
    }

    // score increases slowly over time while running
    score += dt * 0.01;
    updateScore(false);
  }

  function updateScore(round=true){
    const s = Math.floor(score);
    scoreDisplay.textContent = s;
    hudScore.textContent = s;
    if(round && s > best){ best = s; localStorage.setItem('spaceDodgerBest', best); bestDisplay.textContent = best; }
  }

  function draw(t){
    // clear
    const cw = canvas.clientWidth;
    const ch = canvas.clientHeight;
    ctx.clearRect(0,0,cw,ch);

    // starfield background (simple)
    const starCount = 60;
    for(let i=0;i<starCount;i++){
      const sx = (i*37 + Math.floor(t/15)) % cw;
      const sy = ((i*23) + (t/30)) % ch;
      const rad = 0.6 + (i%3)*0.4;
      ctx.beginPath();
      ctx.fillStyle = i%7===0 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)';
      ctx.ellipse(sx, sy, rad, rad, 0,0,Math.PI*2);
      ctx.fill();
    }

    // draw gems behind
    for(const g of state.gems) drawGem(g);

    // draw asteroids
    for(const a of state.asteroids) drawAsteroid(a);

    // draw player ship
    const p = state.player;
    drawShip(p.x, p.y, p.w, p.h, t);

    // draw thruster flame if boosting
    const boosting = keys[' '] || boostHold || keys['w'] || keys['arrowup'];
    if(boosting){
      ctx.save();
      ctx.translate(p.x, p.y + p.h/2);
      const grad = ctx.createRadialGradient(0,8,2, 0,40,60);
      grad.addColorStop(0, 'rgba(255,190,120,0.9)');
      grad.addColorStop(1,'rgba(255,120,50,0.02)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0,20, 10 + Math.random()*4, 26 + Math.random()*6, 0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // HUD small crosshair for center
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - p.h/3, 2, 2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // optionally show "paused"
    if(paused){
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0,0,cw,ch);
      ctx.fillStyle = '#fff';
      ctx.font = '28px system-ui, Arial';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', cw/2, ch/2);
      ctx.restore();
    }
  }

  function frame(time){
    if(!lastTime) lastTime = time;
    const dt = Math.min(40, time - lastTime); // clamp dt to avoid huge jumps
    lastTime = time;
    if(running && !paused) update(dt);
    draw(time);
    requestAnimationFrame(frame);
  }

  // buttons
  startBtn.addEventListener('click', ()=>{
    if(!running){
      reset();
      running = true;
      paused = false;
      startBtn.textContent = 'Resume';
    } else {
      paused = false;
    }
  });
  pauseBtn.addEventListener('click', ()=>{ paused = !paused; pauseBtn.textContent = paused ? 'Unpause' : 'Pause'; });
  restartBtn.addEventListener('click', ()=>{ reset(); running = true; paused = false; });
  muteBtn.addEventListener('click', ()=>{ muted = !muted; muteBtn.textContent = muted ? 'Unmuted' : 'Mute'; });

  // show touch controls when on small screens
  function checkTouch(){
    if('ontouchstart' in window || navigator.maxTouchPoints > 0){
      touchControls.style.display = 'flex';
    } else {
      touchControls.style.display = 'none';
    }
  }
  checkTouch();

  // start the animation loop
  requestAnimationFrame(frame);

  // initialize player positions and UI
  reset();
  // position the player's x/y after canvas sizing
  function layoutPlayer(){
    state.player.x = canvas.clientWidth/2;
    state.player.y = canvas.clientHeight - 80;
  }
  layoutPlayer();
  window.addEventListener('resize', ()=>{ layoutPlayer(); });

  // Accessibility: keyboard hints
  // allow arrow keys and A/D to move; space or W to boost.
  // Small guidance if user presses H
  window.addEventListener('keypress', (e) => {
    if(e.key.toLowerCase() === 'h'){
      alert('Controls:\nLeft: ← / A\nRight: → / D\nBoost: Space / W\nPause: click Pause\nMobile: use touch buttons');
    }
  });

  // friendly autosave best score display
  updateScore(true);
  </script>
</body>
</html>
